services:
  - type: web
    name: jobportal
    env: python
    region: singapore          # closest to India
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input --clear && python manage.py migrate --no-input
    startCommand: daphne -b 0.0.0.0 -p $PORT job_portal.asgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: job_portal.settings.production
      - key: SECRET_KEY
        generateValue: true      # Render auto-generates a secure key
      - key: ALLOWED_HOSTS
        value: your-app-name.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: jobportal-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: jobportal-redis
          type: redis
          property: connectionString

databases:
  - name: jobportal-db
    plan: free

  - name: jobportal-redis
    type: redis
    plan: free
